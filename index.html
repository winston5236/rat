<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taipei Rat & Bait Radar (見鼠地圖延伸版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin="" />
          
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
        }
        
        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        /* Modern UI Panel */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            max-width: 320px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .info-panel h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #1d1d1f;
            font-weight: 700;
        }

        .info-panel p.subtitle {
            margin: 0 0 15px 0;
            font-size: 12px;
            color: #86868b;
            line-height: 1.4;
        }

        .divider {
            height: 1px;
            background: #e5e5ea;
            margin: 15px 0;
        }

        /* Dynamic Stats Counter Styling */
        .stat-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .stat-label {
            color: #515154;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            font-weight: bold;
            color: #1d1d1f;
        }

        .badge-rat { color: #ff4d4f; }
        .badge-bait { color: #3f3f46; }

        .footer-note {
            font-size: 10px;
            color: #aeaeae;
            margin-top: 15px;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Taipei Rat & Bait Tracker</h1>
        <p class="subtitle">An interactive geographic visualization built on the community-sourced Ratdar data layer.</p>
        
        <div class="divider"></div>
        
        <div class="stat-box">
            <span class="stat-label"><span class="badge-rat">●</span> Total Rat Sightings</span>
            <span class="stat-value" id="rat-count">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label"><span class="badge-bait">●</span> Poison Bait Stations</span>
            <span class="stat-value" id="bait-count">0</span>
        </div>
        
        <div class="divider"></div>
        <div class="footer-note">
            Data layer adapted from <a href="https://ratdar.taipei/" target="_blank" style="color: #0066cc; text-decoration: none;">Ratdar Taipei</a>. All visual rendering computed locally.
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
            
    <script>
        // 1. Initialize Map centered on Taipei City
        const map = L.map('map', {
            center: [25.0478, 121.5170],
            zoom: 13,
            zoomControl: false // Move zoom controls for cleaner UI
        });

        // Add zoom control to the top-right instead of top-left
        L.control.zoom({ position: 'topright' }).addTo(map);

        // 2. Add Leaflet Map Tiles (Clean Light Map style)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Force-refresh map layout to prevent any offset bugs
        setTimeout(() => { map.invalidateSize(); }, 200);

        // ==========================================
        // 3. MASTER DATA LIST
        // When you extract/scrape your final JSON list from ratdar.taipei, 
        // simply paste your entire array right here!
        // ==========================================
        const rawCoordinates = [
            { "lat": 25.0462, "lng": 121.5158, "type": "rat", "desc": "Sighted near Taipei Main Station Exit M3", "time": "2026-07-15 22:15" },
            { "lat": 25.0336, "lng": 121.5648, "type": "rat", "desc": "Active rat spotted in flowerbed near Taipei 101", "time": "2026-07-16 01:40" },
            { "lat": 25.0415, "lng": 121.5435, "type": "bait", "desc": "Municipal black bait container deployed", "time": "2026-07-14 10:00" },
            { "lat": 25.0521, "lng": 121.5211, "type": "rat", "desc": "Running across alleyways near Zhongshan MRT", "time": "2026-07-16 11:10" },
            { "lat": 25.0612, "lng": 121.5185, "type": "bait", "desc": "Sewer perimeter baiting active", "time": "2026-07-13 15:30" }
        ];

        // 4. Marker Rendering & Counting Engine
        function loadMapPoints(data) {
            let ratCount = 0;
            let baitCount = 0;

            data.forEach(point => {
                // Determine styling parameters based on sighting type
                const isRat = point.type === 'rat';
                const fillColor = isRat ? '#ff4d4f' : '#27272a';
                const borderColor = isRat ? '#ffffff' : '#f4f4f5';
                
                // Track stats
                if (isRat) ratCount++; else baitCount++;

                // Render vector-accurate precise circle markers
                const marker = L.circleMarker([point.lat, point.lng], {
                    radius: 9,
                    fillColor: fillColor,
                    color: borderColor,
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.95
                }).addTo(map);

                // Elegant Popup Window
                const popupContent = `
                    <div style="font-family: sans-serif; font-size: 13px; min-width: 160px; line-height: 1.4;">
                        <span style="display: inline-block; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; color: #fff; background-color: ${fillColor};">
                            ${point.type === 'rat' ? '⚠️ Sighting' : '💀 Active Bait'}
                        </span>
                        <div style="color: #1d1d1f; font-weight: 500; margin-bottom: 4px;">${point.desc}</div>
                        <div style="color: #86868b; font-size: 11px;">Recorded: ${point.time}</div>
                    </div>
                `;
                marker.bindPopup(popupContent, { offset: [0, -5] });
            });

            // Update user panel text
            document.getElementById('rat-count').innerText = ratCount;
            document.getElementById('bait-count').innerText = baitCount;
        }

        // Run the builder
        loadMapPoints(rawCoordinates);
    </script>
</body>
</html>
