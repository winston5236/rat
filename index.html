<button onclick="toggleRatRadar()">Toggle Rat Radar View</button>

<div id="radarContainer" style="display:none; position:fixed; right:20px; bottom:20px; width:400px; height:500px; z-index:9999; border: 2px solid #ccc; border-radius: 8px; overflow:hidden; background:white;">
    <iframe src="https://ratdar.taipei/" style="width:100%; height:100%; border:none;"></iframe>
</div>

<script>
function toggleRatRadar() {
    var container = document.getElementById("radarContainer");
    if (container.style.display === "none") {
        container.style.display = "block";
    } else {
        container.style.display = "none";
    }
}
</script>
