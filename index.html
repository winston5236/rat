<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Leaflet Map Layers</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 300px;
            background: #f8f9fa;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #map {
            flex-grow: 1;
            height: 100%;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        input, button {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background: #0056b3;
        }
        hr {
            border: 0;
            border-top: 1px solid #ccc;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Add Map Layers</h3>
        
        <div class="input-group">
            <label for="layerUrl">Paste GeoJSON URL:</label>
            <input type="text" id="layerUrl" placeholder="https://example.com/data.geojson">
            <input type="text" id="urlName" placeholder="Layer Name (Optional)">
            <button onclick="addLayerFromUrl()">Add from URL</button>
        </div>

        <hr>

        <div class="input-group">
            <label for="layerFile">Upload GeoJSON File:</label>
            <input type="file" id="layerFile" accept=".geojson,.json">
            <button onclick="addLayerFromFile()">Add from File</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map centered on Taipei
        const map = L.map('map').setView([25.0330, 121.5654], 12);

        // 2. Add the OpenStreetMap base layer
        const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Initialize the Layer Control to easily toggle layers on/off
        const layerControl = L.control.layers({"Base Map": baseLayer}, {}, { collapsed: false }).addTo(map);
        
        let layerCounter = 1;

        // Function to handle styling and adding GeoJSON data to the map
        function processGeoJSON(data, name) {
            try {
                // Create a Leaflet GeoJSON layer
                const geoJsonLayer = L.geoJSON(data, {
                    // Give it a random color so distinct layers stand out
                    style: function () {
                        const colors = ['#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4'];
                        const randomColor = colors[Math.floor(Math.random() * colors.length)];
                        return { color: randomColor, weight: 3, opacity: 0.8 };
                    },
                    // Add simple popups if the data has properties
                    onEachFeature: function (feature, layer) {
                        if (feature.properties) {
                            let popupContent = '<div style="max-height:200px; overflow-y:auto;">';
                            for (let key in feature.properties) {
                                popupContent += `<strong>${key}:</strong> ${feature.properties[key]}<br>`;
                            }
                            popupContent += '</div>';
                            layer.bindPopup(popupContent);
                        }
                    }
                }).addTo(map);

                // Add to layer control switcher
                const layerName = name || `Layer ${layerCounter++}`;
                layerControl.addOverlay(geoJsonLayer, layerName);

                // Automatically zoom map to fit the newly added layer data
                const bounds = geoJsonLayer.getBounds();
                if (bounds.isValid()) {
                    map.fitBounds(bounds);
                }
            } catch (error) {
                alert("Error processing spatial data. Make sure it is valid GeoJSON format.");
                console.error(error);
            }
        }

        // Method 1: Fetch GeoJSON via Link
        function addLayerFromUrl() {
            const url = document.getElementById('layerUrl').value.trim();
            const name = document.getElementById('urlName').value.trim();

            if (!url) {
                alert("Please enter a valid URL.");
                return;
            }

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("Network response was not ok");
                    return response.json();
                })
                .then(data => {
                    processGeoJSON(data, name);
                    document.getElementById('layerUrl').value = ''; // clear input
                    document.getElementById('urlName').value = '';
                })
                .catch(err => {
                    alert("Failed to fetch data. Note: The external server must support CORS (Cross-Origin Resource Sharing).");
                    console.error(err);
                });
        }

        // Method 2: Read GeoJSON via Local File
        function addLayerFromFile() {
            const fileInput = document.getElementById('layerFile');
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file first.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    processGeoJSON(data, file.name.replace(/\.[^/.]+$/, "")); // use filename without extension
                    fileInput.value = ''; // clear input
                } catch (err) {
                    alert("Invalid JSON file format.");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
