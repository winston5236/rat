<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Radar 延伸應用地圖</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin="" />
          
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000; /* 確保面板在地圖最上層 */
            max-width: 280px;
        }
        .info-panel h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #333;
        }
        .info-panel p {
            margin: 0 0 10px 0;
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }
        #stats {
            font-size: 13px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3>台北鼠蹤與毒餌地圖</h3>
        <p>此地圖串接自見鼠地圖資料來源。</p>
        <div id="stats">資料載入中...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
            
    <script>
        // 1. 初始化地圖，並加上確保地圖自適應容器大小的設定
        const map = L.map('map', {
            center: [25.0478, 121.5170],
            zoom: 13,
            zoomSnap: 0.5
        });

        // 2. 載入 OpenStreetMap 地圖磚
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. 修正：當視窗大小改變或地圖載入時，強制 Leaflet 重新計算地圖容器尺寸（解決偏移問題）
        setTimeout(() => {
            map.invalidateSize();
        }, 100);

        // 4. 準備模擬資料（緯度 lat, 經度 lng）
        // 註：台灣台北的經緯度順序是 [緯度(25.xxx), 經度(121.xxx)]，請確認順序沒有顛倒
        const mockData = [
            { lat: 25.0462, lng: 121.5158, type: 'rat', desc: '台北車站館前路目擊肥大黑鼠', time: '2026-07-15 19:30' },
            { lat: 25.0435, lng: 121.5435, type: 'bait', desc: '東區地下街出口發現毒餌', time: '2026-07-14 15:00' },
            { lat: 25.0336, lng: 121.5648, type: 'rat', desc: '台北101周邊花圃老鼠亂竄', time: '2026-07-16 08:15' }
        ];

        // 5. 渲染標記
        function renderMarkers(points) {
            points.forEach(point => {
                // 我們使用 L.circleMarker (圓點) 而非預設 Pin 針圖示，
                // 這能 100% 避免因為預設圖檔遺失或定位錨點（Anchor）偏失造成的對不準問題。
                const color = point.type === 'rat' ? '#ff4d4f' : '#262626'; // 紅色代表鼠，深黑色代表毒餌
                
                const marker = L.circleMarker([point.lat, point.lng], {
                    radius: 10,
                    fillColor: color,
                    color: '#ffffff', // 白色外框
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                // 彈出視窗內容
                const popupContent = `
                    <div style="font-size: 13px; line-height: 1.5;">
                        <strong style="color: ${color}; font-size: 14px;">
                            ${point.type === 'rat' ? '⚠️ 鼠隻目擊' : '💀 毒餌分佈'}
                        </strong><br>
                        <strong>時間:</strong> ${point.time}<br>
                        <strong>描述:</strong> ${point.desc}
                    </div>
                `;
                marker.bindPopup(popupContent);
            });

            document.getElementById('stats').innerHTML = `目前偵測到 ${points.length} 個通報點。`;
        }

        // 執行渲染
        renderMarkers(mockData);
    </script>
</body>
</html>
